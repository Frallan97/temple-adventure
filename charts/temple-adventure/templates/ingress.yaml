{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "temple-adventure.fullname" . }}
  labels:
    {{- include "temple-adventure.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.frontend.host }}
        - {{ .Values.ingress.backend.host }}
      secretName: {{ include "temple-adventure.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.frontend.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "temple-adventure.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
    - host: {{ .Values.ingress.backend.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "temple-adventure.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
{{- end }}
