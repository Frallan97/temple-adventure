apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "temple-adventure.fullname" . }}-backend
  labels:
    {{- include "temple-adventure.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: ENVIRONMENT
              value: "production"
            - name: DATABASE_URL
              value: "postgresql://postgres:$(DB_PASSWORD)@{{ include "temple-adventure.fullname" . }}-postgres:5432/temple_adventure?sslmode=disable"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "temple-adventure.fullname" . }}-secrets
                  key: DB_PASSWORD
            - name: ALLOWED_ORIGINS
              value: "https://{{ .Values.ingress.frontend.host }}"
            - name: CONTENT_DIR
              value: "/app/content"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
