apiVersion: v1
kind: Service
metadata:
  name: {{ include "temple-adventure.fullname" . }}-backend
  labels:
    {{- include "temple-adventure.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/component: backend
