imagePullSecrets:
  - name: ghcr-pull-secret

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/frallan97/temple-adventure-backend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/frallan97/temple-adventure-frontend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

postgres:
  enabled: true
  image: postgres:15-alpine
  service:
    port: 5432
  persistence:
    enabled: true
    size: 5Gi
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  frontend:
    host: temple-adventure.vibeoholic.com
  backend:
    host: temple-adventure-api.vibeoholic.com
  tls:
    enabled: true
